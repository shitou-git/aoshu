<style>

    font-size: 1.15rem; color: var(--c-primary); margin-bottom: 10px;

    margin: 8px 0; font-size: 0.95rem; border-left: 3px solid #9ca3af;
  }

  /* ========== 悬浮按钮 ========== */
  .float-btn {

    background: #fff; border-radius: 14px; box-shadow: var(--shadow-strong);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-weight: bold; font-size: 0.8rem; padding: 6px 4px;
    width: 44px; line-height: 1; gap: 2px;
    border: 2px solid var(--c-primary-soft);

  .float-btn:hover { background: var(--c-primary-soft); }
  .float-btn-top { top: 24px; color: var(--c-primary); }
  .float-btn-random { top: 96px; color: var(--c-accent); border-color: #fce7f3; }

    .float-btn { right: 4px; width: 36px; }
    .float-btn .arrow { font-size: 1rem; }
    .float-btn .label-top, .float-btn .label-mid { font-size: 0.7rem; }
    .header h1 { font-size: 1.6rem; letter-spacing: 1px; }

  /* ========== 页脚 ========== */
  .footer {
    text-align: center; padding: 20px; color: var(--c-muted); font-size: 0.9rem;
    margin-top: 30px;
  }
  .hidden { display: none !important; }
</style>
</head>

// ============ HTML 转义 ============
function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ============ 渲染 ============
function render() {
  const byCat = {};
  TYPES.forEach(function(t) {
    if (!byCat[t.cat]) byCat[t.cat] = [];
    byCat[t.cat].push(t);
  });
  const catGrid = document.getElementById("catGrid");
  let catHtml = "";
  for (const cat in byCat) {
    catHtml += '<a class="cat-link" href="#cat-' + encodeURIComponent(cat) + '">' + cat + '<span class="count">(' + byCat[cat].length + ')</span></a>';
  }
  catGrid.innerHTML = catHtml;
  document.getElementById("totalTypes").textContent = TYPES.length;
  const content = document.getElementById("content");
  let htmlOut = "";
  for (const cat in byCat) {
    htmlOut += '<div class="category" id="cat-' + encodeURIComponent(cat) + '" data-cat="' + cat + '">';
    htmlOut += '<div class="category-title"><span><span class="icon">📘</span>' + cat + '</span><span class="note">共 ' + byCat[cat].length + ' 类</span></div>';
    byCat[cat].forEach(function(t) {
      var id = "t-" + Math.random().toString(36).slice(2, 8);
      htmlOut += '<div class="card" id="' + id + '" data-name="' + t.name + '" data-keywords="' + (t.keywords||[]).join(" ") + '" data-cat="' + t.cat + '">';
      htmlOut += '<h3><span class="emoji">' + (t.emoji||"📌") + '</span>' + t.name + '</h3>';
      htmlOut += '<div class="keywords"><strong>判断关键词：</strong>';
      (t.keywords||[]).forEach(function(k) { htmlOut += '<span class="tag">' + k + '</span>'; });
      htmlOut += '</div>';
      htmlOut += '<p style="color:#6b7280;font-size:0.92rem;margin-top:6px;">💬 ' + (t.note||"") + '</p>';
      if (t.formula) htmlOut += '<div class="formula">' + escapeHtml(t.formula) + '</div>';
      if (t.steps && t.steps.length) {
        htmlOut += '<div class="steps"><h4>🪜 解题四步法</h4><ol>';
        t.steps.forEach(function(s) { htmlOut += '<li>' + escapeHtml(s) + '</li>'; });
        htmlOut += '</ol></div>';
      }
      if (t.examples && t.examples.length) {
        htmlOut += '<div class="example"><div class="example-title">📝 典型例题</div>';
        t.examples.forEach(function(e) { htmlOut += '<div>· ' + escapeHtml(e) + '</div>'; });
        htmlOut += '</div>';
      }
      htmlOut += '</div>';
    });
    htmlOut += '</div>';
  }
  content.innerHTML = htmlOut;
}

// ============ 搜索 ============
function setupSearch() {
  var input = document.getElementById("searchInput");
  if (!input) return;
  input.addEventListener("input", function() {
    var q = input.value.trim().toLowerCase();
    var cards = document.querySelectorAll(".card");
    var cats = document.querySelectorAll(".category");
    cards.forEach(function(card) {
      var text = (card.dataset.name + " " + card.dataset.keywords + " " + card.dataset.cat + " " + card.textContent).toLowerCase();
      if (!q || text.indexOf(q) >= 0) card.classList.remove("hidden");
      else card.classList.add("hidden");
    });
    cats.forEach(function(cat) {
      var visible = cat.querySelectorAll(".card:not(.hidden)").length;
      cat.style.display = visible > 0 ? "" : "none";
    });
  });
}

// ============ 顶部按钮 ============
function setupTopBtn() {
  var btn = document.getElementById("topBtn");
  if (!btn) return;
  btn.addEventListener("click", function() {
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
}

// ============ 启动 ============
render();
setupSearch();
setupTopBtn();

</script>
